[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Custom markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    slow: Tests that take a long time to run
    requires_db: Tests requiring database connection
    requires_llm: Tests requiring LLM endpoint
    requires_embedding: Tests requiring embedding endpoint
    requires_reranker: Tests requiring reranker endpoint

# Coverage configuration
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    -ra

# Minimum coverage threshold (optional, uncomment to enforce)
# --cov-fail-under=90

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test output configuration
console_output_style = progress

# Warnings configuration
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Timeout for tests (optional)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# addopts = -n auto

