apiVersion: apps/v1
kind: Deployment
metadata:
  name: "digitize-api"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: digitize-api
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/component: digitize-api
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: digitize-db-init
          image: "{{ .Values.digitize.image }}"
          command:
            - "/var/venv/bin/python"
            - "/opt/rag/digitize/db/scripts/init_db.py"
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "{{ .Values.digitize.database }}"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "postgres-credentials"
                  key: password
      containers:
        - name: digitize-api
          image: "{{ .Values.digitize.image }}"
          command:
            - "/var/venv/bin/python"
            - "-m"
            - "uvicorn"
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4000"
            - "--loop"
            - "uvloop"
            - "--http"
            - "httptools"
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "{{ .Values.digitize.database }}"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "postgres-credentials"
                  key: password
            - name: DB_POOL_SIZE
              value: "5"
            - name: DB_MAX_OVERFLOW
              value: "5"
            - name: EMB_ENDPOINT
              value: http://embedding-predictor:8080
            - name: EMB_MODEL
              value: {{ .Values.embedding.model.name | quote }}
            - name: EMB_MAX_MODEL_LEN
              value: {{ .Values.embedding.model.maxModelLen | quote }}
            - name: LLM_ENDPOINT
              value: http://instruct-predictor:8000
            - name: LLM_MODEL
              value: {{ .Values.instruct.model.name | quote }}
            - name: LLM_MAX_MODEL_LEN
              value: {{ .Values.instruct.model.maxModelLen | quote }}
            - name: LLM_MAX_BATCH_SIZE
              value: {{ .Values.instruct.model.maxBatchSize | quote }}
            - name: OPENSEARCH_HOST
              value: "opensearch"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_DB_PREFIX
              value: "RAG_DB"
            - name: OPENSEARCH_INDEX_NAME
              value: "RAG_INDEX"
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: OPENSEARCH_NUM_SHARDS
              value: "{{ .Values.opensearch.numShards }}"
            - name: LOG_LEVEL
              value: "{{ .Values.digitize.log_level }}"
            {{- if .Values.instruct.apiKey }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: "vllm-instruct-api-key"
                  key: apiKey
            {{- end }}
            - name: OMP_NUM_THREADS
              value: "4"
            - name: MKL_NUM_THREADS
              value: "4"
            - name: DOCLING_NUM_THREADS
              value: "4"
            - name: OPENBLAS_NUM_THREADS
              value: "1"
          ports:
            - containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "16"
              memory: "50Gi"
            limits:
              cpu: "16"
              memory: "50Gi"
          volumeMounts:
            - mountPath: /var/cache
              name: cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: cache
