# Architecture identification
id: rag
name: "Digital Assistant"
description: "Enable digital assistants using Retrieval-Augmented Generation (RAG), including AI services that query a managed knowledge base to answer questions from custom documents and data."
version: "1.0.0"
type: architecture

# Certification and support
certified_by: "IBM"
runtimes:
  - podman

# Global components shared across all services
# These components are deployed once and reused by all services
global_components:
  - type: vector_store
  - type: embedding

# Service composition (version is optional, uses latest if not specified)
services:
  - id: chat
    version: ">=1.0.0"
    
  - id: digitize
    version: ">=1.0.0"
  
  - id: summarize
    version: ">=1.0.0"
    optional: true

# Links
links:
  demo: "https://example.com/demo/rag"
  code: "https://github.com/project-ai-services/spyre-rag"
  documentation: "https://docs.example.com/rag"

